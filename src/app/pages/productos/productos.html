<div class="productos-container">
  <div class="container py-5">
    <h1 class="mb-4">Nuestros Productos</h1>

    <!-- Filtros -->
    <div class="row mb-4">
      <div class="col-md-6">
        <input
          type="text"
          class="form-control"
          placeholder="Buscar productos..."
          [(ngModel)]="buscador"
          (input)="onBuscadorChange()"
        />
      </div>
      <div class="col-md-6">
        <select
          class="form-select"
          [(ngModel)]="categoriaSeleccionada"
          (change)="onCategoriaChange()"
        >
          <option *ngFor="let cat of categorias">{{ cat }}</option>
        </select>
      </div>
    </div>

    <!-- Grid de productos -->
    <div class="row g-4">
      <div *ngFor="let producto of productosFiltrados" class="col-md-6 col-lg-4 col-xl-3">
        <div class="card h-100 shadow-sm">
          <img
            [src]="producto.imagen"
            class="card-img-top"
            [alt]="producto.nombre"
            style="height: 200px; object-fit: cover;"
          />

          <div class="card-body">
            <h5 class="card-title">{{ producto.nombre }}</h5>

            <p class="card-text text-muted">
              {{ producto.categoria }}
            </p>

            <p class="card-text">
              <small
                *ngIf="producto.stock > 0; else sinStock"
                [ngStyle]="{
                  color: producto.stock <= 5 ? 'orange' : 'green',
                  'font-weight': 'bold'
                }"
              >
                Stock: {{ producto.stock }}
              </small>

              <ng-template #sinStock>
                <small
                  [ngStyle]="{
                    color: 'red',
                    'font-weight': 'bold'
                  }"
                >
                  Sin Stock
                </small>
              </ng-template>
            </p>

            <p class="h5 text-primary mb-3">
              {{ producto.precio | currency:'USD':'symbol':'1.2-2' }}
            </p>
          </div>

          <div class="card-footer bg-white">
            <button
              class="btn btn-primary w-100"
              [disabled]="producto.stock === 0"
              (click)="agregarAlCarrito(producto)"
            >
              <span *ngIf="producto.stock > 0">
                Agregar al Carrito
              </span>

              <span *ngIf="producto.stock === 0">
                No Disponible
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Mensaje si no hay productos -->
    <div
      *ngIf="productosFiltrados.length === 0"
      class="alert alert-info mt-5 text-center"
    >
      <p>No se encontraron productos que coincidan con tu búsqueda.</p>
    </div>
  </div>
</div>
