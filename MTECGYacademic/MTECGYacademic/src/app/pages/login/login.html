<main class="login-container">
  <div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
      <div class="col-md-6 col-lg-5">
        <!-- Card de login -->
        <div class="card login-card shadow-lg">
          <div class="card-header text-center bg-primary text-white py-4">
            <h2 class="mb-2">
              <i class="fas fa-lock-open"></i> Iniciar Sesión
            </h2>
            <p class="mb-0 small">Accede a tu cuenta de MTecGY Academy</p>
          </div>

          <div class="card-body p-4">
            <!-- Alertas -->
            <div class="alert alert-danger alert-dismissible fade show" *ngIf="mensajeError" role="alert">
              <i class="fas fa-exclamation-circle"></i> {{ mensajeError }}
              <button type="button" class="btn-close" (click)="mensajeError = ''"></button>
            </div>

            <div class="alert alert-success alert-dismissible fade show" *ngIf="mensajeExito" role="alert">
              <i class="fas fa-check-circle"></i> {{ mensajeExito }}
              <button type="button" class="btn-close" (click)="mensajeExito = ''"></button>
            </div>

            <!-- Formulario -->
            <form>
              <div class="mb-3">
                <label class="form-label fw-bold">
                  <i class="fas fa-envelope"></i> Correo Electrónico
                </label>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  placeholder="correo@ejemplo.com"
                  [(ngModel)]="correo"
                  name="correo"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">
                  <i class="fas fa-key"></i> Contraseña
                </label>
                <div class="input-group input-group-lg">
                  <input
                    [type]="mostrarPassword ? 'text' : 'password'"
                    class="form-control"
                    placeholder="Ingrese su contraseña"
                    [(ngModel)]="password"
                    name="password"
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    (click)="togglePassword()"
                  >
                    <i [class]="mostrarPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                  </button>
                </div>
              </div>

              <button
                type="button"
                class="btn btn-primary btn-lg w-100 mb-3"
                (click)="iniciarSesion()"
              >
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
              </button>
            </form>

            <!-- Divider -->
            <div class="d-flex align-items-center my-4">
              <hr class="flex-grow-1" />
              <span class="mx-2 text-muted small">O prueba con</span>
              <hr class="flex-grow-1" />
            </div>

            <!-- Credenciales de prueba -->
            <div class="credentials-demo">
              <p class="small text-muted mb-2"><i class="fas fa-info-circle"></i> Credenciales de prueba:</p>
              <button
                type="button"
                class="btn btn-sm btn-outline-secondary w-100 mb-2"
                *ngFor="let cred of credencialesDemo"
                (click)="autoCompletarCredenciales(cred)"
                [title]="'Usuario: ' + cred.nombre"
              >
                {{ cred.correo }} ({{ cred.nombre }})
              </button>
            </div>

            <!-- Link registro -->
            <hr class="my-4" />
            <p class="text-center mb-0">
              ¿No tienes una cuenta?
              <a routerLink="/registro" class="text-primary fw-bold">
                <i class="fas fa-user-plus"></i> Regístrate aquí
              </a>
            </p>
          </div>
        </div>

        <!-- Info card -->
        <div class="card mt-3 bg-light border-0">
          <div class="card-body small">
            <p class="mb-2">
              <strong>Requisitos de contraseña:</strong>
            </p>
            <ul class="ps-3 mb-0">
              <li>Mínimo 8 caracteres</li>
              <li>Al menos una mayúscula</li>
              <li>Al menos un número</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
